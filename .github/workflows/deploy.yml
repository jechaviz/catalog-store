name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # O la rama que uses como principal

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_ODOO_BASE_URL: ${{ secrets.VITE_ODOO_BASE_URL }}
          VITE_ODOO_GRAPHQL_URL: ${{ secrets.VITE_ODOO_GRAPHQL_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/public' # Ajustado según la salida de Vite en este proyecto

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
